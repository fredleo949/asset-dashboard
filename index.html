<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>財富儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0c0d0f;
  --paper:#f5f2ec;
  --warm:#e8e2d8;
  --border:#d4cfc6;
  --gold:#b8860b;
  --gold-lt:#d4a017;
  --gold-pale:#f0e6cc;
  --rust:#8b4513;
  --green:#2d5016;
  --green-lt:#4a7c23;
  --red:#8b1a1a;
  --muted:#7a7265;
  --card:#faf8f4;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --r:12px;
}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden}
/* ── LAYOUT ── */
.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
/* ── SIDEBAR ── */
aside{background:var(--ink);color:var(--paper);display:flex;flex-direction:column;padding:0;position:sticky;top:0;height:100vh;overflow:hidden}
.aside-top{padding:32px 24px 24px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand{font-family:'DM Serif Display',serif;font-size:22px;line-height:1.2;letter-spacing:-.3px;color:#fff}
.brand span{color:var(--gold-lt);font-style:italic}
.brand-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:6px;font-family:'DM Mono',monospace}
.nav-section{padding:20px 12px 0;flex:1;overflow-y:auto}
.nav-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.25);padding:0 12px;margin-bottom:8px;font-family:'DM Mono',monospace}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;background:none;color:rgba(255,255,255,.55);cursor:pointer;border-radius:8px;font-size:13px;font-family:'Noto Sans TC',sans-serif;transition:all .15s;text-align:left;margin-bottom:2px}
.nav-btn:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-btn.active{background:rgba(212,160,23,.15);color:var(--gold-lt)}
.nav-btn .icon{width:18px;height:18px;opacity:.6;flex-shrink:0}
.nav-btn.active .icon{opacity:1}
.aside-bottom{padding:20px 24px;border-top:1px solid rgba(255,255,255,.08)}
.aside-bottom p{font-size:10px;color:rgba(255,255,255,.2);line-height:1.6;font-family:'DM Mono',monospace}
/* ── MAIN ── */
main{overflow:hidden;display:flex;flex-direction:column}
/* ── TOP BAR ── */
.topbar{padding:24px 36px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--card)}
.page-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--ink)}
.topbar-right{display:flex;align-items:center;gap:12px}
.snapshot-pill{display:flex;align-items:center;gap:8px;background:var(--ink);color:var(--gold-lt);padding:8px 16px;border-radius:100px;font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.snapshot-nav{display:flex;align-items:center;gap:4px}
.snap-arrow{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.snap-arrow:hover{background:rgba(255,255,255,.2);color:#fff}
.snap-arrow:disabled{opacity:.2;cursor:not-allowed}
/* ── CONTENT ── */
.content{padding:28px 36px;flex:1;overflow-y:auto}
/* ── HERO ── */
.hero-row{display:grid;grid-template-columns:1fr auto;gap:24px;margin-bottom:24px;align-items:start}
.hero-card{background:var(--ink);border-radius:var(--r);padding:32px;color:#fff;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(212,160,23,.15) 0%,transparent 70%);pointer-events:none}
.hero-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:12px;font-family:'DM Mono',monospace}
.hero-amount{font-family:'DM Serif Display',serif;font-size:52px;color:#fff;line-height:1;letter-spacing:-1px}
.hero-amount .currency{font-size:22px;color:var(--gold-lt);vertical-align:top;margin-top:8px;margin-right:4px;font-family:'DM Mono',monospace;font-style:normal}
.hero-change{display:inline-flex;align-items:center;gap:6px;margin-top:16px;padding:6px 12px;border-radius:100px;font-size:12px;font-family:'DM Mono',monospace;font-weight:500}
.hero-change.pos{background:rgba(74,124,35,.2);color:#7bc142}
.hero-change.neg{background:rgba(139,26,26,.25);color:#e87474}
.hero-change.neu{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.hero-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:8px;font-family:'DM Mono',monospace}
/* ── MINI STATS ── */
.mini-stats{display:flex;flex-direction:column;gap:12px;min-width:200px}
.mini-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.mini-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-family:'DM Mono',monospace}
.mini-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500}
.mini-val.cash{color:#2563eb}
.mini-val.invest{color:var(--green-lt)}
.mini-bar{height:4px;background:var(--warm);border-radius:2px;margin-top:8px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
/* ── CHART ROW ── */
.chart-row{display:grid;grid-template-columns:1fr 280px;gap:20px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
.card-badge{font-size:10px;padding:3px 8px;border-radius:4px;background:var(--gold-pale);color:var(--gold);font-family:'DM Mono',monospace;border:1px solid rgba(184,134,11,.2)}
.chart-wrap{position:relative}
/* ── TIMELINE ── */
.timeline-card{margin-bottom:24px}
.timeline-scroll{overflow-x:auto;padding-bottom:8px}
.timeline-scroll::-webkit-scrollbar{height:3px}
.timeline-scroll::-webkit-scrollbar-track{background:var(--warm)}
.timeline-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.timeline-inner{display:flex;align-items:flex-end;gap:0;padding:8px 0 32px;position:relative;min-width:max-content}
.tl-track{position:absolute;bottom:28px;left:0;right:0;height:1px;background:var(--border)}
.tl-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:0 14px;position:relative;transition:all .15s}
.tl-bar-wrap{height:48px;display:flex;align-items:flex-end;margin-bottom:8px}
.tl-bar{width:8px;border-radius:3px 3px 0 0;background:var(--warm);border:1px solid var(--border);transition:all .2s}
.tl-item.active .tl-bar,.tl-item:hover .tl-bar{background:var(--ink);border-color:var(--ink)}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--border);border:2px solid var(--paper);transition:all .2s;z-index:1;position:relative}
.tl-item.active .tl-dot,.tl-item:hover .tl-dot{background:var(--gold);border-color:var(--paper);box-shadow:0 0 0 3px rgba(184,134,11,.2)}
.tl-date{position:absolute;bottom:-4px;font-size:9px;color:var(--muted);white-space:nowrap;transform:rotate(-40deg) translateX(-6px);transform-origin:top left;font-family:'DM Mono',monospace}
.tl-item.active .tl-date{color:var(--ink);font-weight:500}
/* ── ACCOUNT TABLE ── */
.account-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.acc-table{width:100%;border-collapse:collapse}
.acc-table th{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;padding:0 0 12px;font-weight:400;text-align:left;border-bottom:1px solid var(--border)}
.acc-table th:last-child{text-align:right}
.acc-row{transition:background .1s;cursor:default}
.acc-row:hover td{background:var(--warm)}
.acc-row td{padding:10px 0;border-bottom:1px solid var(--warm);vertical-align:middle;font-size:13px}
.acc-row td:first-child{padding-right:12px}
.acc-row td:last-child{text-align:right;font-family:'DM Mono',monospace;font-weight:500}
.acc-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:8px;flex-shrink:0}
.acc-name{display:flex;align-items:center}
.acc-name-text{flex:1}
.acc-sub{font-size:10px;color:var(--muted);display:block;margin-top:1px}
.type-tag{font-size:9px;padding:2px 6px;border-radius:3px;font-family:'DM Mono',monospace;letter-spacing:.5px}
.type-tag.cash{background:#dbeafe;color:#1d4ed8}
.type-tag.invest{background:#dcfce7;color:#15803d}
.type-tag.other{background:var(--warm);color:var(--muted)}
.amt-bar-cell{width:80px}
.amt-mini-bar{height:3px;background:var(--warm);border-radius:2px;margin-top:4px}
.amt-mini-fill{height:100%;border-radius:2px}
/* ── EDITOR PANEL ── */
.editor-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:24px}
.editor-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:gap}
.editor-tabs{display:flex;gap:4px;background:var(--warm);padding:3px;border-radius:8px}
.tab-btn{padding:6px 14px;border:none;background:none;border-radius:6px;font-size:12px;cursor:pointer;color:var(--muted);font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.tab-btn.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.editor-actions{display:flex;gap:8px}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;display:flex;align-items:center;gap:6px;font-weight:500}
.btn-primary{background:var(--ink);color:#fff;border:1px solid var(--ink)}
.btn-primary:hover{background:#2a2b2e}
.btn-ghost{background:none;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}
.btn-danger{background:none;color:var(--red);border:1px solid rgba(139,26,26,.3)}
.btn-danger:hover{background:rgba(139,26,26,.05)}
/* edit form */
.edit-date-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.edit-date-row label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace;white-space:nowrap}
.edit-input{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--ink);font-family:'DM Mono',monospace;outline:none;transition:border-color .15s;width:100%}
.edit-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.1)}
.edit-date-row .edit-input{width:160px}
.accounts-form-header{display:grid;grid-template-columns:1fr 120px 140px 36px;gap:8px;padding-bottom:8px;border-bottom:1px solid var(--warm)}
.accounts-form-header span{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
.acc-entries{margin-bottom:12px;max-height:280px;overflow-y:auto}
.acc-entries::-webkit-scrollbar{width:3px}
.acc-entries::-webkit-scrollbar-track{background:transparent}
.acc-entries::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.acc-entry{display:grid;grid-template-columns:1fr 120px 140px 36px;gap:8px;margin-bottom:6px;align-items:center}
.acc-entry select.edit-input{cursor:pointer}
.remove-btn{background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.remove-btn:hover{border-color:var(--red);color:var(--red)}
.add-entry-btn{display:flex;align-items:center;gap:6px;width:100%;padding:8px;border:1px dashed var(--border);border-radius:8px;background:none;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;margin-bottom:16px;justify-content:center;font-family:'Noto Sans TC',sans-serif}
.add-entry-btn:hover{border-color:var(--gold);color:var(--gold)}
.save-msg{font-size:12px;color:var(--green-lt);display:none;align-items:center;gap:6px;font-family:'DM Mono',monospace}
/* ── PAGE TABS ── */
.page-view{display:none}
.page-view.active{display:block}
/* ── DONUT CENTER ── */
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.donut-val{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink)}
.donut-sub{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace}
/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-family:'DM Mono',monospace;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;border-left:3px solid var(--gold-lt)}
.toast.show{transform:translateY(0);opacity:1}
/* ── HISTORY TAB ── */
.history-table{width:100%;border-collapse:collapse}
.history-table th{font-size:9px;letter-spacing:2px;color:var(--muted);font-family:'DM Mono',monospace;text-align:left;padding:0 12px 12px;font-weight:400;border-bottom:1px solid var(--border)}
.history-table th:last-child{text-align:right}
.history-table td{padding:12px;border-bottom:1px solid var(--warm);font-size:13px;cursor:pointer}
.history-table tr:hover td{background:var(--warm)}
.history-table td:first-child{font-family:'DM Mono',monospace;font-weight:500;color:var(--ink)}
.history-table td.amt{font-family:'DM Mono',monospace;text-align:right;font-weight:500}
.chg-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace}
.chg-badge.pos{background:#dcfce7;color:#15803d}
.chg-badge.neg{background:#fee2e2;color:#dc2626}
.chg-badge.neu{background:var(--warm);color:var(--muted)}
/* ── RESPONSIVE ── */
@media(max-width:900px){
  .shell{grid-template-columns:1fr}
  aside{display:none}
  .chart-row,.account-grid{grid-template-columns:1fr}
  .hero-row{grid-template-columns:1fr}
  .mini-stats{flex-direction:row}
  .content{padding:20px}
  .topbar{padding:16px 20px}
}
</style>
</head>
<body>
<div class="shell">
<!-- ── SIDEBAR ── -->
<aside>
  <div class="aside-top">
    <div class="brand">資產<span>圖表</span></div>
    <div class="brand-sub">Personal Finance · 2020–2026</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">導覽</div>
    <button class="nav-btn active" onclick="switchPage('dashboard')">
      <svg class="icon" fill="none" viewBox="0 0 18 18"><rect x="1" y="1" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="1" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="10" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="10" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
      總覽儀表板
    </button>
    <button class="nav-btn" onclick="switchPage('history')">
      <svg class="icon" fill="none" viewBox="0 0 18 18"><path d="M3 4h12M3 8h8M3 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      歷史記錄
    </button>
    <button class="nav-btn" onclick="switchPage('editor')">
      <svg class="icon" fill="none" viewBox="0 0 18 18"><path d="M3 14l1.5-1.5 9-9L15 5l-9 9L4.5 15.5 3 14z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M12 3l3 3" stroke="currentColor" stroke-width="1.5"/></svg>
      新增快照
    </button>
    <div class="nav-label" style="margin-top:20px">快速切換</div>
    <div id="sidebarDates" style="max-height:240px;overflow-y:auto"></div>
  </div>
  <div class="aside-bottom">
    <p>儲存於 localStorage<br>資料不會上傳至任何伺服器</p>
  </div>
</aside>

<!-- ── MAIN ── -->
<main>
  <div class="topbar">
    <div class="page-title" id="pageTitle">總覽儀表板</div>
    <div class="topbar-right">
      <div class="snapshot-nav">
        <button class="snap-arrow" id="prevSnap" onclick="goPrev()">‹</button>
        <div class="snapshot-pill">
          <span id="currentDateLabel">—</span>
        </div>
        <button class="snap-arrow" id="nextSnap" onclick="goNext()">›</button>
      </div>
    </div>
  </div>

  <div class="content">
    <!-- DASHBOARD PAGE -->
    <div class="page-view active" id="page-dashboard">
      <!-- Hero row -->
      <div class="hero-row">
        <div class="hero-card">
          <div class="hero-label">總資產淨值</div>
          <div class="hero-amount"><span class="currency">NT$</span><span id="heroVal">—</span></div>
          <div class="hero-change neu" id="heroChange">載入中...</div>
          <div class="hero-sub" id="heroSub">—</div>
        </div>
        <div class="mini-stats">
          <div class="mini-card">
            <div class="mini-label">活存 / 現金</div>
            <div class="mini-val cash" id="miniCash">—</div>
            <div class="mini-bar"><div class="mini-bar-fill" id="miniCashBar" style="background:#2563eb"></div></div>
          </div>
          <div class="mini-card">
            <div class="mini-label">投資資產</div>
            <div class="mini-val invest" id="miniInvest">—</div>
            <div class="mini-bar"><div class="mini-bar-fill" id="miniInvestBar" style="background:var(--green-lt)"></div></div>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      <div class="card timeline-card">
        <div class="card-header">
          <div class="card-title">時間軸</div>
          <span class="card-badge" id="tlBadge">22 個快照</span>
        </div>
        <div class="timeline-scroll">
          <div class="timeline-inner" id="timelineInner">
            <div class="tl-track"></div>
          </div>
        </div>
      </div>

      <!-- Charts -->
      <div class="chart-row">
        <div class="card">
          <div class="card-header">
            <div class="card-title">資產累積走勢</div>
          </div>
          <div class="chart-wrap" style="height:220px">
            <canvas id="trendChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">類型分布</div>
          </div>
          <div class="chart-wrap" style="height:220px;position:relative">
            <canvas id="pieChart"></canvas>
            <div class="donut-center">
              <div class="donut-val" id="donutVal">—</div>
              <div class="donut-sub">淨資產</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Accounts -->
      <div class="account-grid">
        <div class="card">
          <div class="card-header">
            <div class="card-title">活存帳戶</div>
            <span class="card-badge" id="cashCount">—</span>
          </div>
          <table class="acc-table">
            <thead><tr>
              <th>帳戶</th><th>金額</th>
            </tr></thead>
            <tbody id="cashTableBody"></tbody>
          </table>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">投資帳戶</div>
            <span class="card-badge" id="investCount">—</span>
          </div>
          <table class="acc-table">
            <thead><tr>
              <th>帳戶</th><th>金額</th>
            </tr></thead>
            <tbody id="investTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- HISTORY PAGE -->
    <div class="page-view" id="page-history">
      <div class="card">
        <div class="card-header">
          <div class="card-title">所有快照記錄</div>
          <span class="card-badge" id="historyCount">—</span>
        </div>
        <table class="history-table">
          <thead><tr>
            <th>日期</th>
            <th>總資產</th>
            <th>活存</th>
            <th>投資</th>
            <th>帳戶數</th>
            <th style="text-align:right">變動</th>
          </tr></thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </div>

    <!-- EDITOR PAGE -->
    <div class="page-view" id="page-editor">
      <div class="editor-panel">
        <div class="editor-top">
          <div class="editor-tabs">
            <button class="tab-btn active" onclick="editorTab('edit')">編輯目前快照</button>

let snaps, cur, currentPage='dashboard';
function load(){try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s)}catch(e){}return JSON.parse(JSON.stringify(DEFAULT))}
function save(){try{localStorage.setItem(SK,JSON.stringify(snaps))}catch(e){}}
snaps=load(); cur=snaps.length-1;

// ─── FORMAT ───
function fmtK(n){if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+'M';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(0)+'K';return n.toFixed(0)}
function fmtFull(n){return Math.abs(n)>=1e4?n.toLocaleString('zh-TW',{maximumFractionDigits:0}):n.toFixed(0)}

// ─── TOAST ───
function toast(msg,dur=2000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}

// ─── PAGE NAV ───
function switchPage(p){
  currentPage=p;
  document.querySelectorAll('.page-view').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const idx=['dashboard','history','editor'].indexOf(p);
  document.querySelectorAll('.nav-btn')[idx]?.classList.add('active');
  const titles={dashboard:'總覽儀表板',history:'歷史記錄',editor:'編輯快照'};
  document.getElementById('pageTitle').textContent=titles[p]||p;
  if(p==='history')renderHistory();
  if(p==='editor')buildEditorForm();
}
function editorTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if(t==='new'){
    document.getElementById('editDate').value='';
    document.getElementById('accEntries').innerHTML='';
    addEntry();addEntry();addEntry();
  } else { buildEditorForm(); }
}

// ─── NAV ───
function goPrev(){if(cur>0){cur--;render()}}
function goNext(){if(cur<snaps.length-1){cur++;render()}}

// ─── CHARTS ───
let tChart=null,pChart=null;
function buildTrend(){
  const ctx=document.getElementById('trendChart').getContext('2d');
  if(tChart)tChart.destroy();
  const maxT=Math.max(...snaps.map(s=>s.total));
  tChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:snaps.map(s=>s.date),
      datasets:[
        {label:'總資產',data:snaps.map(s=>s.total),borderColor:'#0c0d0f',backgroundColor:'rgba(12,13,15,.04)',borderWidth:2,fill:true,tension:.4,
          pointBackgroundColor:snaps.map((_,i)=>i===cur?'#b8860b':'transparent'),
          pointBorderColor:snaps.map((_,i)=>i===cur?'#b8860b':'rgba(12,13,15,.2)'),
          pointRadius:snaps.map((_,i)=>i===cur?7:3),pointHoverRadius:5},
        {label:'活存',data:snaps.map(s=>s.cash),borderColor:'#2563eb',borderWidth:1.5,fill:false,tension:.4,pointRadius:0,borderDash:[4,3]},
        {label:'投資',data:snaps.map(s=>s.invest),borderColor:'#4a7c23',borderWidth:1.5,fill:false,tension:.4,pointRadius:0,borderDash:[4,3]},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#7a7265',font:{size:10,family:'DM Mono'},boxWidth:16,padding:14}},
        tooltip:{backgroundColor:'#0c0d0f',borderColor:'rgba(255,255,255,.1)',borderWidth:1,
          titleColor:'rgba(255,255,255,.5)',bodyColor:'#fff',
          callbacks:{label:c=>`${c.dataset.label}: NT$ ${fmtFull(c.raw)}`}
        }
      },
      scales:{
        x:{grid:{color:'rgba(212,207,198,.5)'},ticks:{color:'#7a7265',font:{size:9,family:'DM Mono'},maxRotation:45}},
        y:{grid:{color:'rgba(212,207,198,.5)'},ticks:{color:'#7a7265',font:{size:10,family:'DM Mono'},callback:v=>fmtK(v)}}
      },
      onClick:(_,els)=>{if(els.length){cur=els[0].index;render()}}
    }
  });
}
function buildPie(){
  const ctx=document.getElementById('pieChart').getContext('2d');
  if(pChart)pChart.destroy();
  const s=snaps[cur];
  const cashPos=Math.max(0,s.cash);
  const investPos=Math.max(0,s.invest);
  pChart=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:['活存 / 現金','投資資產'],
      datasets:[{data:[cashPos,investPos],backgroundColor:['#2563eb','#4a7c23'],borderColor:'#faf8f4',borderWidth:4,hoverOffset:6}]
    },

      responsive:true,maintainAspectRatio:false,cutout:'72%',

          callbacks:{label:c=>` NT$ ${fmtFull(c.raw)} (${(c.raw/s.total*100).toFixed(1)}%)`}
        }
      }
    }
  });
  document.getElementById('donutVal').textContent=fmtK(s.total);
}

// ─── TIMELINE ───
function buildTimeline(){
  const inner=document.getElementById('timelineInner');
  while(inner.children.length>1)inner.removeChild(inner.lastChild);
  const maxT=Math.max(...snaps.map(s=>s.total));
  snaps.forEach((s,i)=>{
    const barH=Math.max(6,Math.round((s.total/maxT)*44));
    const el=document.createElement('div');
    el.className='tl-item'+(i===cur?' active':'');
    el.innerHTML=`<div class="tl-bar-wrap"><div class="tl-bar" style="height:${barH}px"></div></div><div class="tl-dot"></div><div class="tl-date">${s.date}</div>`;
    el.onclick=()=>{cur=i;render()};
    inner.appendChild(el);
  });
  document.getElementById('tlBadge').textContent=`${snaps.length} 個快照`;
  // scroll active into view
  setTimeout(()=>{
    const items=inner.querySelectorAll('.tl-item');
    items[cur]?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },50);
}

// ─── SIDEBAR DATES ───
function buildSidebar(){
  const c=document.getElementById('sidebarDates');
  c.innerHTML='';
  [...snaps].reverse().forEach((s,ri)=>{
    const i=snaps.length-1-ri;
    const btn=document.createElement('button');
    btn.className='nav-btn'+(i===cur?' active':'');
    btn.style.cssText='font-size:12px;font-family:DM Mono,monospace;justify-content:space-between';
    btn.innerHTML=`<span>${s.date}</span><span style="font-size:10px;opacity:.5">${fmtK(s.total)}</span>`;
    btn.onclick=()=>{cur=i;render()};
    c.appendChild(btn);
  });
}

// ─── ACCOUNTS ───
const COLORS=['#b8860b','#2563eb','#4a7c23','#8b4513','#6d28d9','#0891b2','#be185d','#065f46','#7c3aed','#b45309','#1d4ed8','#166534'];
function buildAccounts(){
  const s=snaps[cur];
  const cashItems=s.items.filter(i=>i.type==='活存'||i.amount<0).sort((a,b)=>b.amount-a.amount);
  const investItems=s.items.filter(i=>i.type==='投資').sort((a,b)=>b.amount-a.amount);
  const maxAmt=Math.max(...s.items.map(i=>Math.abs(i.amount)));
  function makeRows(items,tbodyId){
    const tbody=document.getElementById(tbodyId);
    tbody.innerHTML='';
    items.forEach((item,i)=>{
      const color=COLORS[i%COLORS.length];
      const pct=(Math.abs(item.amount)/maxAmt*100).toFixed(0);
      const isNeg=item.amount<0;
      const label=item.sub?`${item.account}<span class="acc-sub">${item.sub}</span>`:item.account;
      const tr=document.createElement('tr');tr.className='acc-row';
      tr.innerHTML=`
        <td><div class="acc-name"><span class="acc-dot" style="background:${color}"></span><span class="acc-name-text">${label}</span></div></td>
        <td class="amt-bar-cell"></td>
        <td style="color:${isNeg?'#8b1a1a':color};text-align:right">${isNeg?'-':''}NT$${fmtFull(Math.abs(item.amount))}<div class="amt-mini-bar"><div class="amt-mini-fill" style="width:${pct}%;background:${color}"></div></div></td>`;
      tbody.appendChild(tr);
    });
    if(!items.length){const tr=document.createElement('tr');tr.innerHTML='<td colspan="3" style="padding:20px 0;color:var(--muted);font-size:12px;text-align:center">無資料</td>';tbody.appendChild(tr)}
  }
  makeRows(cashItems,'cashTableBody');
  makeRows(investItems,'investTableBody');
  document.getElementById('cashCount').textContent=`${cashItems.length} 筆`;
  document.getElementById('investCount').textContent=`${investItems.length} 筆`;
}

// ─── HERO ───
function updateHero(){
  const s=snaps[cur];
  const prev=cur>0?snaps[cur-1]:null;
  document.getElementById('heroVal').textContent=fmtFull(Math.round(s.total));
  document.getElementById('currentDateLabel').textContent=s.date;
  const el=document.getElementById('heroChange');
  if(prev){
    const d=s.total-prev.total;
    const p=((d/prev.total)*100).toFixed(1);
    const sign=d>=0?'+':'';
    el.className='hero-change '+(d>=0?'pos':'neg');
    el.textContent=`${sign}NT$${fmtFull(Math.round(d))}  ${sign}${p}%`;
  } else {el.className='hero-change neu';el.textContent='最早記錄'}
  document.getElementById('heroSub').textContent=`vs 前期：${cur>0?snaps[cur-1].date:'—'}`;
  const cashPct=s.total>0?(s.cash/s.total*100):0;
  const invPct=s.total>0?(s.invest/s.total*100):0;
  document.getElementById('miniCash').textContent='NT$'+fmtK(s.cash);
  document.getElementById('miniInvest').textContent='NT$'+fmtK(s.invest);
  document.getElementById('miniCashBar').style.width=Math.max(0,cashPct)+'%';
  document.getElementById('miniInvestBar').style.width=Math.max(0,invPct)+'%';
  document.getElementById('prevSnap').disabled=cur<=0;
  document.getElementById('nextSnap').disabled=cur>=snaps.length-1;
}

// ─── HISTORY ───
function renderHistory(){
  const tbody=document.getElementById('historyBody');
  tbody.innerHTML='';
  document.getElementById('historyCount').textContent=`共 ${snaps.length} 筆`;
  [...snaps].reverse().forEach((s,ri)=>{
    const i=snaps.length-1-ri;
    const prev=i>0?snaps[i-1]:null;
    const diff=prev?s.total-prev.total:null;
    const diffPct=prev?((diff/prev.total)*100).toFixed(1):null;
    const sign=diff>=0?'+':'';
    const badge=diff===null?`<span class="chg-badge neu">首筆</span>`:
      `<span class="chg-badge ${diff>=0?'pos':'neg'}">${sign}${fmtK(diff)} (${sign}${diffPct}%)</span>`;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${s.date}</td><td class="amt" style="color:var(--ink)">NT$${fmtFull(s.total)}</td><td class="amt" style="color:#2563eb">NT$${fmtFull(s.cash)}</td><td class="amt" style="color:#4a7c23">NT$${fmtFull(s.invest)}</td><td style="text-align:center;color:var(--muted)">${s.items.length}</td><td style="text-align:right">${badge}</td>`;
    tr.onclick=()=>{cur=i;render();switchPage('dashboard')};
    tbody.appendChild(tr);
  });
}

// ─── EDITOR ───
function buildEditorForm(){
  const s=snaps[cur];
  document.getElementById('editDate').value=s.date;
  const c=document.getElementById('accEntries');c.innerHTML='';
  s.items.forEach(item=>addEntry(item));
}
function addEntry(item){
  const c=document.getElementById('accEntries');
  const row=document.createElement('div');row.className='acc-entry';
  row.innerHTML=`
    <input class="edit-input e-name" type="text" placeholder="帳戶名稱" value="${item?.account||''}">
    <select class="edit-input e-type">
      <option value="活存" ${item?.type==='活存'?'selected':''}>活存</option>
      <option value="投資" ${item?.type==='投資'?'selected':''}>投資</option>
      <option value="" ${item?.type===''?'selected':''}>其他</option>
    </select>
    <input class="edit-input e-amt" type="number" placeholder="0" value="${item?.amount??''}">
    <button class="remove-btn" onclick="this.parentNode.remove()">×</button>`;
  c.appendChild(row);
}
function saveSnapshot(){
  const date=document.getElementById('editDate').value.trim();
  if(!date){toast('⚠ 請輸入日期');return}
  const rows=document.querySelectorAll('.acc-entry');
  const items=[];
  rows.forEach(r=>{
    const n=r.querySelector('.e-name').value.trim();
    const t=r.querySelector('.e-type').value;
    const a=parseFloat(r.querySelector('.e-amt').value)||0;
    if(n)items.push({account:n,type:t,sub:'',amount:a});
  });
  const total=items.reduce((s,i)=>s+i.amount,0);
  const cash=items.filter(i=>i.type==='活存').reduce((s,i)=>s+i.amount,0);
  const invest=items.filter(i=>i.type==='投資').reduce((s,i)=>s+i.amount,0);
  const ei=snaps.findIndex(s=>s.date===date);
  if(ei>=0){snaps[ei]={date,total,cash,invest,items};cur=ei}
  else{snaps.push({date,total,cash,invest,items});snaps.sort((a,b)=>a.date.localeCompare(b.date));cur=snaps.findIndex(s=>s.date===date)}
  save();render();toast('✓ 已儲存');
  const m=document.getElementById('saveMsg');m.style.display='flex';setTimeout(()=>m.style.display='none',2500);
}
function deleteSnapshot(){
  if(snaps.length<=1){toast('⚠ 至少保留一筆');return}
  if(!confirm(`確定刪除 ${snaps[cur].date}？`))return;
  snaps.splice(cur,1);
  cur=Math.min(cur,snaps.length-1);
  save();render();switchPage('dashboard');toast('已刪除');
}

// ─── MAIN RENDER ───
function render(){
  updateHero();
  buildTimeline();
  buildTrend();
  buildPie();
  buildAccounts();
  buildSidebar();
}
render();
</script>
